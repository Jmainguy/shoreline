name: Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create tags and GitHub releases
      pull-requests: write # create/update release PR, labels
      issues: write        # comment on release PR
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          release-type: go
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

  release:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache: false

      - name: Set up ko
        uses: ko-build/setup-ko@v0.9

      - name: Login to docker
        uses: docker/login-action@v3
        with:
          registry: zot.soh.re
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          KO_DOCKER_REPO: zot.soh.re/shoreline
